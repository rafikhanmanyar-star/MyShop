databases:
  - name: Myshop-db-staging
    databaseName: myshop
    user: myshop_user

services:
  - type: web
    name: MyShop-Api
    env: node
    plan: starter
    branch: main
    buildCommand: cd server && npm install --include=dev && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: "*"
      - key: MOBILE_APP_URL
        value: https://myshop-mobile.onrender.com
      - key: RIDER_APP_URL
        value: https://myshop-rider.onrender.com
    disk:
      name: myshop-uploads
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 1

  - type: web
    name: MyShop-Rider
    runtime: static
    branch: main
    rootDir: rider
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Must match your API public URL + /api (same shape as mobile/.env.production.example).
      - key: VITE_API_URL
        value: https://myshop-api-9pd4.onrender.com/api